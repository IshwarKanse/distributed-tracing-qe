apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
data:
  ingestion-test.js: |
    // Ingestion Performance Test for Tempo
    // Uses xk6-client-tracing to generate realistic traces at target MB/s
    import tracing from 'k6/x/tracing';
    import { Counter } from 'k6/metrics';
    import { getConfig, getEndpoints, THRESHOLDS } from './lib/config.js';
    import { getTemplate, ESTIMATED_BYTES_PER_TRACE } from './lib/trace-profiles.js';

    const ingestionFailures = new Counter('tempo_ingestion_failures_total');
    const tracesTotal = new Counter('tempo_ingestion_traces_total');
    const bytesTotal = new Counter('tempo_ingestion_bytes_total');

    const config = getConfig();
    const endpoints = getEndpoints();
    const traceTemplate = getTemplate(config.ingestion.traceProfile);
    const estimatedBytesPerTrace = ESTIMATED_BYTES_PER_TRACE[config.ingestion.traceProfile] || 5000;
    const tracesPerSecond = Math.max(1, Math.ceil(config.ingestion.bytesPerSecond / estimatedBytesPerTrace));

    export const options = {
        scenarios: {
            ingestion: {
                executor: 'constant-arrival-rate',
                rate: tracesPerSecond,
                timeUnit: '1s',
                duration: config.duration,
                preAllocatedVUs: config.vus.min,
                maxVUs: config.vus.max,
            },
        },
        thresholds: THRESHOLDS.ingestion,
    };

    const client = new tracing.Client({
        endpoint: endpoints.ingestion,
        exporter: tracing.EXPORTER_OTLP,
        tls: {
            insecure: true,
        },
    });

    export function setup() {
        console.log(`
    ================================================================================
      TEMPO INGESTION PERFORMANCE TEST
    ================================================================================
      Size:              ${config.name}
      Target Rate:       ${config.ingestion.mbPerSecond} MB/s
      Traces/sec:        ${tracesPerSecond}
      Trace Profile:     ${config.ingestion.traceProfile} (~${traceTemplate.spans.length} spans)
      Duration:          ${config.duration}
      VUs:               ${config.vus.min} - ${config.vus.max}
      Endpoint:          ${endpoints.ingestion}
    ================================================================================
        `);
        return {};
    }

    export default function () {
        const gen = new tracing.TemplatedGenerator(traceTemplate);
        try {
            client.push(gen.traces());
            tracesTotal.add(1);
            bytesTotal.add(estimatedBytesPerTrace);
        } catch (e) {
            ingestionFailures.add(1);
            console.error(`Failed to push trace: ${e}`);
        }
    }

    export function teardown() {
        client.shutdown();
        console.log(`
    ================================================================================
      TEST COMPLETE
    ================================================================================
        `);
    }
  config.js: |
    // T-Shirt Size Configuration for k6 Performance Tests
    export const SIZES = {
        small: {
            name: 'small',
            description: 'Light load - suitable for development and CI',
            ingestion: { mbPerSecond: 0.1, traceProfile: 'small' },
            query: { queriesPerSecond: 5 },
            duration: '5m',
            vus: { min: 5, max: 20 },
        },
        medium: {
            name: 'medium',
            description: 'Moderate load - typical production baseline',
            ingestion: { mbPerSecond: 1, traceProfile: 'medium' },
            query: { queriesPerSecond: 25 },
            duration: '5m',
            vus: { min: 10, max: 50 },
        },
        large: {
            name: 'large',
            description: 'Heavy load - stress testing',
            ingestion: { mbPerSecond: 5, traceProfile: 'large' },
            query: { queriesPerSecond: 50 },
            duration: '5m',
            vus: { min: 20, max: 100 },
        },
        xlarge: {
            name: 'xlarge',
            description: 'Extreme load - capacity testing',
            ingestion: { mbPerSecond: 20, traceProfile: 'xlarge' },
            query: { queriesPerSecond: 100 },
            duration: '5m',
            vus: { min: 50, max: 200 },
        },
    };

    export function getConfig(sizeOverride) {
        const size = sizeOverride || __ENV.SIZE || 'medium';
        const config = SIZES[size.toLowerCase()];
        if (!config) {
            throw new Error(`Unknown size: ${size}. Valid sizes: ${Object.keys(SIZES).join(', ')}`);
        }
        const mbPerSecond = parseFloat(__ENV.MB_PER_SECOND) || config.ingestion.mbPerSecond;
        const traceProfile = __ENV.TRACE_PROFILE || config.ingestion.traceProfile;
        const bytesPerSecond = Math.floor(mbPerSecond * 1024 * 1024);
        return {
            ...config,
            ingestion: {
                ...config.ingestion,
                mbPerSecond: mbPerSecond,
                traceProfile: traceProfile,
                bytesPerSecond: bytesPerSecond,
            },
            query: {
                ...config.query,
                queriesPerSecond: parseInt(__ENV.QUERIES_PER_SECOND) || config.query.queriesPerSecond,
            },
            duration: __ENV.DURATION || config.duration,
            vus: {
                min: parseInt(__ENV.VUS_MIN) || config.vus.min,
                max: parseInt(__ENV.VUS_MAX) || config.vus.max,
            },
        };
    }

    export function getEndpoints() {
        return {
            ingestion: __ENV.TEMPO_ENDPOINT || 'localhost:4317',
            query: __ENV.TEMPO_QUERY_ENDPOINT || 'http://localhost:3200',
            tenant: __ENV.TEMPO_TENANT || '',
            token: __ENV.TEMPO_TOKEN || '',
        };
    }

    export function getTLSConfig() {
        const queryTLSEnabled = __ENV.TEMPO_QUERY_TLS_ENABLED === 'true';
        return {
            queryTLSEnabled: queryTLSEnabled,
            caFile: __ENV.TEMPO_TLS_CA_FILE || '',
            tokenFile: __ENV.TEMPO_TOKEN_FILE || '',
            insecureSkipVerify: __ENV.TEMPO_TLS_INSECURE === 'true',
        };
    }

    export const THRESHOLDS = {
        ingestion: {
            'tempo_ingestion_bytes_total': ['rate>0'],
            'tempo_ingestion_traces_total': ['rate>0'],
            'tempo_ingestion_failures_total': ['rate<1'],
        },
        query: {
            'tempo_query_failures_total': ['rate<1'],
        },
        combined: {
            'tempo_ingestion_bytes_total': ['rate>0'],
            'tempo_ingestion_traces_total': ['rate>0'],
            'tempo_ingestion_failures_total': ['rate<1'],
            'tempo_query_failures_total': ['rate<1'],
        },
    };

    export default { SIZES, getConfig, getEndpoints, getTLSConfig, THRESHOLDS };
  trace-profiles.js: |
    // Trace Profiles for xk6-client-tracing TemplatedGenerator
    // Each profile defines a trace tree with service spans, durations, and attributes
    // Root span always uses service "perftest" for verification query compatibility
    import tracing from 'k6/x/tracing';

    const defaultSettings = {
        attributeSemantics: tracing.SEMANTICS_HTTP,
        randomAttributes: {count: 2, cardinality: 5},
        randomEvents: {count: 0.1, exceptionCount: 0.1, randomAttributes: {count: 3, cardinality: 10}},
    };

    // Estimated bytes per trace for each profile (used to calculate traces/sec from MB/s target)
    export const ESTIMATED_BYTES_PER_TRACE = {
        small: 4000,
        medium: 10000,
        large: 14000,
        xlarge: 28000,
    };

    // Small Profile: Startup/MVP (8 spans, 5 services)
    const smallTemplate = {
        defaults: defaultSettings,
        spans: [
            {service: "perftest", name: "POST /api/orders", duration: {min: 100, max: 500}},
            {service: "api-gateway", name: "validate-request", duration: {min: 5, max: 20}},
            {service: "user-service", name: "authenticate", duration: {min: 10, max: 50}, parentIdx: 0},
            {service: "api-gateway", name: "process-order", duration: {min: 20, max: 100}, parentIdx: 0},
            {service: "database", name: "check-inventory", duration: {min: 5, max: 30}},
