    export function getTemplate(name) {
        const template = TRACE_TEMPLATES[name.toLowerCase()];
        if (!template) {
            throw new Error(`Unknown profile: ${name}. Valid profiles: ${Object.keys(TRACE_TEMPLATES).join(', ')}`);
