# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tempo-perf-1x-medium
spec:
  timeouts:
    cleanup: 90s
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install-storage.yaml
    - assert:
        file: 00-assert.yaml
  - name: step-01
    try:
    - apply:
        file: 01-install-tempo.yaml
    - assert:
        timeout: 5m
        file: 01-assert.yaml
  - name: step-02
    try:
    - apply:
        file: 02-install-otelcol.yaml
    - assert:
        file: 02-assert.yaml
  - name: step-03
    try:
    - apply:
        file: 03-generate-load.yaml
    - assert:
        timeout: 15m
        file: 03-assert.yaml
  - name: step-04
    try:
    - apply:
        file: ../common/verify-traces.yaml
    - assert:
        timeout: 5m
        file: ../common/assert-verify-traces.yaml
  - name: step-05
    try:
    - apply:
        file: ../common/verify-metrics.yaml
    - assert:
        timeout: 5m
        file: ../common/assert-verify-metrics.yaml
  - name: step-06
    try:
    - apply:
        file: ../common/verify-query-performance.yaml
    - assert:
        timeout: 5m
        file: ../common/assert-verify-query-performance.yaml
