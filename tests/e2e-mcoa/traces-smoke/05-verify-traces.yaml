# Verify that traces generated by step 04 reach the TempoStack.
#
# Queries the Jaeger v3 API on the in-cluster tempo-smoke-query-frontend service
# for our service ("mcoa-traces-smoke"), retrying for up to ~3 minutes to ride
# out ingester flush latency. The Job's success is asserted by 05-assert.yaml,
# so Chainsaw owns the waiting instead of an external orchestration script.
apiVersion: batch/v1
kind: Job
metadata:
  name: verify-traces
  namespace: chainsaw-mcoa-traces-smoke
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: verify-traces
          image: ghcr.io/grafana/tempo-operator/test-utils:main@sha256:abe652bdd34f9433b5bbe0e8100838b154f69b51aec0a9cc04fe381eef7bec84
          command:
            - /bin/bash
            - -euc
            - |
              HOST="tempo-smoke-query-frontend:16686"
              SERVICE="mcoa-traces-smoke"
              for i in $(seq 1 36); do
                if curl -fsS "http://${HOST}/api/services" \
                     | jq -e --arg s "$SERVICE" '.data | index($s)' >/dev/null; then
                  echo "FOUND service ${SERVICE} after $((i*5))s"
                  echo "--- traces ---"
                  curl -fsS "http://${HOST}/api/traces?service=${SERVICE}&limit=5" \
                    | jq '.data | length'
                  exit 0
                fi
                echo "attempt ${i}: service ${SERVICE} not yet visible"
                sleep 5
              done
              echo "TIMEOUT: service ${SERVICE} never appeared in Tempo"
              exit 1
